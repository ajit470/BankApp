<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Customer Accounts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/admin/dashboard}">Bank Admin</a>
    <form class="ms-auto" th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn btn-outline-light btn-sm">Logout</button>
    </form>
  </div>
</nav>

<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h4 class="mb-0">Customer Accounts</h4>
      <div class="text-muted small">
        Customer: <b th:text="${customer.fullName}">Name</b> |
        Email: <b th:text="${customer.user.username}">email</b> |
        KYC: <b th:text="${customer.kycStatus}">PENDING</b>
      </div>
    </div>
    <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/dashboard}">Back</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">

      <div class="table-responsive">
        <table class="table table-bordered align-middle">
          <thead class="table-light">
          <tr>
            <th>Account No</th>
            <th>Type</th>
            <th>Status</th>
            <th class="text-end">Balance (INR)</th>
            <th style="width:170px;">Transactions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(accounts)}">
            <td colspan="5" class="text-center text-muted py-4">No accounts found for this customer.</td>
          </tr>

          <tr th:each="a : ${accounts}">
            <td th:text="${a.accountNo}">21xxxxxxxxxx</td>
            <td th:text="${a.accountType.displayName}">Savings</td>
            <td th:text="${a.status}">ACTIVE</td>
            <td class="text-end">₹ <span th:text="${a.balance}">0.00</span></td>
            <td>
              <a class="btn btn-outline-primary btn-sm"
                 th:href="@{/admin/accounts/{aid}/transactions(aid=${a.id})}">
                View Transactions
              </a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div>
</body>
</html>
