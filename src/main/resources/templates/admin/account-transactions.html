<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Account Transactions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/admin/dashboard}">Bank Admin</a>
    <form class="ms-auto" th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn btn-outline-light btn-sm">Logout</button>
    </form>
  </div>
</nav>

<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h4 class="mb-0">Account Transactions</h4>
      <div class="text-muted small">
        Account: <b th:text="${account.accountNo}">21xxxx</b> |
        Type: <b th:text="${account.accountType.displayName}">Savings</b> |
        Balance: <b>₹ <span th:text="${account.balance}">0.00</span></b>
      </div>
    </div>
    <a class="btn btn-outline-secondary btn-sm"
       th:href="@{/admin/customers/{cid}/accounts(cid=${account.customer.id})}">
      Back to Accounts
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">

      <div class="table-responsive">
        <table class="table table-striped align-middle">
          <thead>
          <tr>
            <th>Date</th>
            <th>Ref</th>
            <th>Type</th>
            <th>Dr/Cr</th>
            <th class="text-end">Amount</th>
            <th class="text-end">Balance After</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(entries)}">
            <td colspan="6" class="text-center text-muted py-4">No transactions found.</td>
          </tr>

          <tr th:each="e : ${entries}">
            <td th:text="${e.createdAt}"></td>
            <td th:text="${e.transaction.reference}"></td>
            <td th:text="${e.transaction.txnType}"></td>

            <td>
              <span th:if="${e.direction.name() == 'CREDIT'}" class="badge text-bg-success">CREDIT</span>
              <span th:if="${e.direction.name() == 'DEBIT'}" class="badge text-bg-danger">DEBIT</span>
            </td>

            <td class="text-end">₹ <span th:text="${e.amount}"></span></td>
            <td class="text-end">₹ <span th:text="${e.balanceAfter}"></span></td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="small text-muted mt-2">
        Showing latest 50 ledger entries (deposit/withdraw/transfer etc.).
      </div>
    </div>
  </div>

</div>
</body>
</html>
