<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Pending KYC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/admin/dashboard}">Bank Admin</a>

    <form class="ms-auto" th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn btn-outline-light btn-sm">Logout</button>
    </form>
  </div>
</nav>

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Pending KYC Customers</h4>
    <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/dashboard}">Back</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped align-middle mb-0">
          <thead>
          <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th style="width:220px;">Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(customers)}">
            <td colspan="5" class="text-center text-muted py-4">No pending KYC.</td>
          </tr>

          <tr th:each="c : ${customers}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.fullName}"></td>
            <td th:text="${c.user.username}"></td>
            <td th:text="${c.phone}"></td>
            <td>
              <div class="d-flex gap-2">
                <form th:action="@{/admin/kyc/{id}/approve(id=${c.id})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button class="btn btn-success btn-sm" type="submit">Approve</button>
                </form>

                <form th:action="@{/admin/kyc/{id}/reject(id=${c.id})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button class="btn btn-danger btn-sm" type="submit">Reject</button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="mt-3 small text-muted">
        On approval: system enables the user login and creates a Savings account.
      </div>
    </div>
  </div>
</div>
</body>
</html>
