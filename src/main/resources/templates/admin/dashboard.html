<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/admin/dashboard}">Bank Admin</a>

    <form class="ms-auto" th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn btn-outline-light btn-sm">Logout</button>
    </form>
  </div>
</nav>

<div class="container py-4">
  <h4 class="mb-3 app-page-title">Admin Dashboard</h4>

  <div class="row g-3 mb-3">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">KYC Approvals</h5>
          <p class="card-text text-muted">Approve / Reject pending customer registrations.</p>
          <a class="btn btn-primary" th:href="@{/admin/kyc/pending}">Open Pending KYC</a>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <h5 class="mb-3">All Customers</h5>

      <div class="table-responsive">
        <table class="table table-striped align-middle">
          <thead>
          <tr>
            <th>S.No</th>
            <th>Email/Username</th>
            <th>Roles</th>
            <th>Enabled</th>
            <th>Locked</th>
            <th>Customer Name</th>
            <th>Phone</th>
            <th>KYC</th>
            <th style="width: 160px;">Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="9" class="text-center text-muted py-4">No customers found.</td>
          </tr>

          <tr th:each="u, stat : ${users}">
            <td th:text="${stat.count}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.roles}"></td>

            <td>
              <span th:if="${u.enabled}" class="badge text-bg-success">YES</span>
              <span th:unless="${u.enabled}" class="badge text-bg-secondary">NO</span>
            </td>

            <td>
              <span th:if="${u.locked}" class="badge text-bg-danger">YES</span>
              <span th:unless="${u.locked}" class="badge text-bg-success">NO</span>
            </td>

            <td th:text="${u.fullName != null ? u.fullName : '-'}"></td>
            <td th:text="${u.phone != null ? u.phone : '-'}"></td>
            <td th:text="${u.kycStatus != null ? u.kycStatus : '-'}"></td>

            <td>
              <a class="btn btn-outline-primary btn-sm"
                 th:if="${u.customerId != null}"
                 th:href="@{/admin/customers/{cid}/accounts(cid=${u.customerId})}">
                View Accounts
              </a>
              <span class="text-muted small" th:if="${u.customerId == null}">N/A</span>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>
</body>
</html>
