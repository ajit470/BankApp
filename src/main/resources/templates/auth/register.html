<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Customer Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-7">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">Customer Registration</h4>
            <a th:href="@{/login}" class="btn btn-outline-secondary btn-sm">Back to Login</a>
          </div>

          <form th:action="@{/register}" th:object="${form}" method="post" enctype="multipart/form-data">
            <!-- CSRF token required -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label">Email</label>
                <input class="form-control" th:field="*{email}" placeholder="your@email.com">
                <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" th:field="*{password}" placeholder="min 6 chars">
                <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
              </div>

              <div class="col-12">
                <label class="form-label">Full Name</label>
                <input class="form-control" th:field="*{fullName}" placeholder="Full name">
                <div class="text-danger small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label">Phone</label>
                <input class="form-control" th:field="*{phone}" placeholder="9999999999">
                <div class="text-danger small" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label">KYC Doc Type</label>
                <select class="form-select" th:field="*{docType}">
                  <option value="">Select</option>
                  <option value="PAN">PAN</option>
                  <option value="AADHAAR">AADHAAR</option>
                  <option value="PASSPORT">PASSPORT</option>
                </select>
                <div class="text-danger small" th:if="${#fields.hasErrors('docType')}" th:errors="*{docType}"></div>
              </div>

              <div class="col-12">
                <label class="form-label">Address</label>
                <textarea class="form-control" th:field="*{address}" rows="2" placeholder="Full address"></textarea>
                <div class="text-danger small" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
              </div>

              <div class="col-12">
                <label class="form-label">Upload KYC File</label>
                <input class="form-control" type="file" th:field="*{kycFile}">
                <div class="text-danger small" th:if="${#fields.hasErrors('kycFile')}" th:errors="*{kycFile}"></div>
                <div class="form-text">Upload PDF/JPG/PNG (max size depends on your config).</div>
              </div>
            </div>

            <button class="btn btn-success mt-4 w-100" type="submit">Submit Registration</button>
          </form>

          <div class="alert alert-warning mt-4 mb-0">
            Note: You can login only after <b>Admin approves your KYC</b>.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
