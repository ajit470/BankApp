<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Registration Success</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="mb-3">Registration Completed</h4>

          <div class="alert alert-success" th:text="${message}">
            Registered successfully. Wait for admin approval to login.
          </div>

          <a class="btn btn-primary w-100" th:href="@{/login}">Go to Login</a>

          <div class="small text-muted mt-3">
            Your account will be enabled only after KYC approval.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
