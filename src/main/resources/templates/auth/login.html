<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="mb-3">Login</h4>

          <div th:if="${param.error}" class="alert alert-danger">
            Login failed OR your account is not approved yet.
          </div>
          <div th:if="${param.logout}" class="alert alert-info">
            Logged out successfully.
          </div>

          <form th:action="@{/login}" method="post">
            <!-- CSRF token required -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input class="form-control" name="username" type="text" placeholder="your@email.com" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input class="form-control" name="password" type="password" placeholder="******" required>
            </div>

            <button class="btn btn-primary w-100" type="submit">Login</button>
          </form>

          <div class="mt-3 text-center">
            <a th:href="@{/register}">New customer? Register here</a>
          </div>

          <hr>
          <div class="small text-muted">
            Admin login: admin@bank.com / admin123
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
