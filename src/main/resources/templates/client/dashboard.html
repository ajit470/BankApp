<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Client Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div class="container-fluid">
    <a class="navbar-brand" href="#">MyBank</a>

    <form class="ms-auto" th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn btn-outline-light btn-sm">Logout</button>
    </form>
  </div>
</nav>

<div class="container py-4">
  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <h4 class="mb-1">Welcome, <span th:text="${profile.fullName}">Customer</span></h4>
      <div class="text-muted small">
        KYC Status: <span th:text="${profile.kycStatus}">VERIFIED</span>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <h5 class="mb-3">Your Accounts</h5>

      <div class="table-responsive">
        <table class="table table-bordered align-middle">
          <thead class="table-light">
          <tr>
            <th>Account No</th>
            <th>Type</th>
            <th>Status</th>
            <th class="text-end">Balance (INR)</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(accounts)}">
            <td colspan="4" class="text-center text-muted py-4">
              No accounts found. (Admin approval creates Savings account.)
            </td>
          </tr>

          <tr th:each="a : ${accounts}">
            <td th:text="${a.accountNo}">210000000000</td>
            <td th:text="${a.accountType.displayName}">Savings Account</td>
            <td th:text="${a.status}">ACTIVE</td>
            <td class="text-end">₹ <span th:text="${a.balance}">0.00</span></td>
          </tr>
          </tbody>
        </table>
      </div>
      <div class="d-flex gap-2 mb-3">
  <a class="btn btn-success btn-sm" th:href="@{/client/deposit}">Deposit</a>
  <a class="btn btn-danger btn-sm" th:href="@{/client/withdraw}">Withdraw</a>
</div>

      <div class="small text-muted">
        Next step: we can add “Transfer Money” + “Transaction History”.
      </div>
    </div>
  </div>
</div>
</body>
</html>
