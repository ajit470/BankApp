<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Deposit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/client/dashboard}">MyBank</a>
    <form class="ms-auto" th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn btn-outline-light btn-sm">Logout</button>
    </form>
  </div>
</nav>

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Deposit (Simulated)</h4>
    <a class="btn btn-outline-secondary btn-sm" th:href="@{/client/dashboard}">Back</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form th:action="@{/client/deposit}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
          <label class="form-label">Select Account</label>
          <select class="form-select" th:field="*{accountId}">
            <option value="">--Select--</option>
            <option th:each="a : ${accounts}"
                    th:value="${a.id}"
                    th:text="${a.accountNo + ' - ' + a.accountType.displayName}">
            </option>
          </select>
          <div class="text-danger small" th:if="${#fields.hasErrors('accountId')}" th:errors="*{accountId}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">Amount (INR)</label>
          <input class="form-control" th:field="*{amount}" placeholder="e.g. 5000">
          <div class="text-danger small" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
        </div>

        <button class="btn btn-success" type="submit">Deposit</button>
      </form>

      <div class="form-text mt-3">
        This is a simulated deposit for project/demo purposes.
      </div>
    </div>
  </div>
</div>

</body>
</html>
